services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    networks:
      - internal

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_NAME:          ${DB_NAME}
      DB_USER:          ${DB_USER}
      DB_PASSWORD:      ${DB_PASSWORD}
      MAIL_HOST:        ${MAIL_HOST:-mailpit}
      MAIL_PORT:        ${MAIL_PORT:-1025}
      MAIL_USER:        ${MAIL_USER:-}
      MAIL_PASSWORD:    ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH:   ${MAIL_SMTP_AUTH:-false}
      MAIL_STARTTLS:    ${MAIL_STARTTLS:-false}
      SHOP_ADMIN_EMAIL: ${SHOP_ADMIN_EMAIL}
    networks:
      - internal

  nginx:
    image: nginx:1.30-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
