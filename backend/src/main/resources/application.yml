app:
  order:
    admin-email: ${SHOP_ADMIN_EMAIL:shop@example.com}
  session:
    absolute-timeout: 8h

spring:
  application:
    name: eshop

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    data:
      redis:
        flush-mode: on-save
        configure-action: notify-keyspace-events

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eshop}
    username: ${DB_USER:eshop}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  jpa:
    open-in-view: false

  mvc:
    problemdetails:
      enabled: true

  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}

server:
  port: 8080
  forward-headers-strategy: native
  tomcat:
    remoteip:
      internal-proxies: '172\.\d{1,3}\.\d{1,3}\.\d{1,3}'
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict
      timeout: 15m

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, loggers, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

spring.otlp:
  metrics:
    export:
      url: http://${OTEL_HOST:localhost}:4318/v1/metrics

spring.opentelemetry:
  tracing:
    export:
      otlp:
        endpoint: http://${OTEL_HOST:localhost}:4318/v1/traces
  logging:
    export:
      otlp:
        endpoint: http://${OTEL_HOST:localhost}:4318/v1/logs
