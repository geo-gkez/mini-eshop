spring:
  application:
    name: eshop
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eshop}
    username: ${DB_USER:eshop}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  mail:
    host:     ${MAIL_HOST:mailpit}
    port:     ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth:            ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}

server:
  port: 8080
  forward-headers-strategy: native
  tomcat:
    remoteip:
      internal-proxies: 172\.\d{1,3}\.\d{1,3}\.\d{1,3}

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
