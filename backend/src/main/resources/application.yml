app:
  order:
    admin-email: ${SHOP_ADMIN_EMAIL:shop@example.com}
    from-email: ${SHOP_FROM_EMAIL:no-reply@example.com}
  session:
    absolute-timeout: 8h
  login-rate-limit:
    username-threshold: 10
    ip-threshold: 20
    window: 15m

spring:
  application:
    name: eshop

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  session:
    data:
      redis:
        flush-mode: on-save
        configure-action: notify-keyspace-events
        # indexed repo enables lookup-by-principal, required for maximumSessions concurrency control
        repository-type: indexed

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eshop}
    username: ${DB_USER:eshop}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  jpa:
    open-in-view: false

  mvc:
    problemdetails:
      enabled: true

  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}
      # 'enable' only OFFERS STARTTLS; 'required' makes the app refuse to send if the server will not
      # negotiate TLS. Off for the local Mailpit sink (no TLS); set true in a real deployment so the
      # admin-notification hop is TLS-enforced rather than best-effort.
      mail.smtp.starttls.required: ${MAIL_STARTTLS_REQUIRED:false}
      # HELO/EHLO name announced to the SMTP server. Defaults to the local hostname, which on Docker is
      # the container id (leaks into the Received header). A neutral logical name avoids that.
      mail.smtp.localhost: ${MAIL_LOCALHOST:mini-eshop}
      # JavaMail default timeouts are infinite; an unresponsive SMTP server would block the request
      # thread (the order-confirmed listener runs synchronously). Bound all three. (Spring Boot ref: IO/Email)
      mail.smtp.connectiontimeout: ${MAIL_CONNECT_TIMEOUT:5000}
      mail.smtp.timeout: ${MAIL_READ_TIMEOUT:3000}
      mail.smtp.writetimeout: ${MAIL_WRITE_TIMEOUT:5000}

server:
  port: 8080
  forward-headers-strategy: native
  tomcat:
    remoteip:
      # RFC1918 172.16.0.0/12 only (the Docker bridge range). The previous '172\.\d{1,3}...'
      # trusted all of 172.0.0.0/8 — including public 172.x hosts — which would let such a source
      # spoof X-Forwarded-For and bypass the per-IP login throttle.
      internal-proxies: '172\.(1[6-9]|2[0-9]|3[01])\.\d{1,3}\.\d{1,3}'
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict
      timeout: 15m

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        # 'loggers' is write-capable (runtime log-level changes) and the management port has no
        # auth — keep it off the exposed set.
        include: health, metrics
  endpoint:
    health:
      # No security on the management context, so 'always' would leak DB/Redis internals to anyone
      # who can reach :8081. 'when_authorized' degrades to a bare {status} for unauthenticated callers.
      show-details: when_authorized
