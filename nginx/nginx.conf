events {}

http {
    include  /etc/nginx/mime.types;
    sendfile on;

    # Strip the nginx version from the Server header and error pages (reduces version fingerprinting).
    server_tokens off;

    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/javascript application/json
                    application/wasm font/woff2 image/svg+xml;

    # TLS session resumption — reduces handshake overhead on reconnects
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Rate limiting (edge, volumetric) ---
    # $binary_remote_addr is the real client IP: nginx is the TLS terminator, so the
    # TCP peer is the external client. This is coarse flood protection; credential-aware
    # login throttling (per-username) lives in the app (LoginRateLimiter) — defence in depth.
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m       rate=10r/s;
    limit_req_status 429;

    # --- HTTP: redirect everything to HTTPS ---
    server {
        listen 80;
        server_name mini-eshop.local;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS ---
    server {
        listen 443 ssl;
        http2  on;
        server_name mini-eshop.local;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers — rationale in NGINX_CONFIG.md
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"          always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
        # style-src 'unsafe-inline' required by Vuetify runtime style injection — see NGINX_CONFIG.md
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

        root  /usr/share/nginx/html;
        index index.html;

        # Login endpoint — tighter flood limit. Exact match takes precedence over /api/.
        # burst allows a short legitimate burst; nodelay rejects excess immediately with 429.
        # A human's sequential retries pass through here and are caught per-username by the
        # app-layer throttle; only a high-rate script (credential stuffing flood) trips this.
        location = /api/auth/login {
            limit_req          zone=login burst=10 nodelay;
            proxy_pass         http://backend:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # Reverse proxy to Spring Boot
        location /api/ {
            limit_req          zone=api_general burst=30 nodelay;
            proxy_pass         http://backend:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Tells Spring the original request was HTTPS so it sets Secure on cookies
            proxy_set_header   X-Forwarded-Proto https;
        }

        # SPA fallback — unknown paths serve index.html for Vue client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
